server:
  port: 8081

spring:
  application:
    name: order-service

  Profiles:
    active: prod
  config:
    import: optional:configserver:http://localhost:8086/

  datasource:
    url: jdbc:postgresql://localhost:5432/order_db
    username: admin
    password: admin123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin123

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: "*"