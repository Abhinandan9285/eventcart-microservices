server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:

            # =========================
            # AUTH SERVICE
            # =========================
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**
              filters:
                - RewritePath=/auth/(?<segment>.*), /$\{segment}

            # =========================
            # ORDER SERVICE
            # =========================
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/orders/**
              filters:
                - RewritePath=/orders/(?<segment>.*), /$\{segment}
                - JwtAuthentication

            # =========================
            # INVENTORY SERVICE
            # =========================
            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/inventory/**
              filters:
                - RewritePath=/inventory/(?<segment>.*), /$\{segment}
                - JwtAuthentication

            # =========================
            # PAYMENT SERVICE
            # =========================
            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payments/**
              filters:
                - RewritePath=/payments/(?<segment>.*), /$\{segment}
                - JwtAuthentication

            # =========================
            # NOTIFICATION SERVICE
            # =========================
            - id: notification-service
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/notification/**
              filters:
                - RewritePath=/notification/(?<segment>.*), /$\{segment}
                - JwtAuthentication
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: your_super_secret_key_your_super_secret_key